<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character Arc — Homepage Prototype v2a (Warm Light)</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { height: 100%; }

  body {
    min-height: 100dvh;
    background: #faf9f7;
    color: #18181b;
    font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-y: auto;
  }

  /* ── Variant Label ── */
  .variant-label {
    position: fixed;
    top: 10px;
    left: 10px;
    z-index: 9999;
    background: rgba(255,255,255,0.9);
    border: 1px solid #eae8e4;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-weight: 600;
    color: #78716c;
    backdrop-filter: blur(6px);
  }

  .shell {
    width: min(100%, 1100px);
    margin: 0 auto;
    padding: 48px clamp(16px, 2.6vw, 28px) clamp(28px, 4vw, 56px);
  }

  /* ── Hero ── */
  .hero {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid #eae8e4;
  }

  .hero-copy { min-width: 0; }

  .hero-copy h1 {
    font-size: clamp(26px, 3vw, 34px);
    font-weight: 740;
    letter-spacing: -0.03em;
    line-height: 1.2;
    color: #18181b;
  }

  .hero-copy p {
    margin-top: 6px;
    color: #a1a1aa;
    font-size: 14px;
    line-height: 1.6;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  /* Icon buttons (standalone) */
  .icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 38px;
    border: 1px solid #eae8e4;
    border-radius: 10px;
    background: #fff;
    color: #52525b;
    cursor: pointer;
    transition: border-color 0.2s cubic-bezier(0.16,1,0.3,1), color 0.2s, background 0.2s, transform 0.15s;
  }

  .icon-btn:hover {
    border-color: #ddd9d2;
    color: #18181b;
    background: #fdfcfa;
    transform: translateY(-1px);
  }

  .icon-btn:active { transform: translateY(0) scale(0.96); }
  .icon-btn svg { width: 18px; height: 18px; }

  /* Tool pill group */
  .tool-group {
    display: flex;
    align-items: center;
    gap: 2px;
    padding: 3px;
    border: 1px solid #eae8e4;
    border-radius: 999px;
    background: #fdfcfa;
  }

  .tool-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    border: none;
    border-radius: 999px;
    background: transparent;
    color: #71717a;
    cursor: pointer;
    transition: background 0.2s cubic-bezier(0.16,1,0.3,1), color 0.2s;
  }

  .tool-btn:hover {
    background: #fff;
    color: #18181b;
  }

  .tool-btn svg { width: 17px; height: 17px; }

  /* Primary create button */
  .btn-create {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    height: 38px;
    padding: 0 18px;
    border: none;
    border-radius: 10px;
    background: #0066cc;
    color: #fff;
    font-size: 13.5px;
    font-weight: 660;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,102,204,0.18);
    transition: background 0.2s cubic-bezier(0.16,1,0.3,1), transform 0.15s, box-shadow 0.2s;
  }

  .btn-create:hover {
    background: #0b76e8;
    transform: translateY(-1px);
    box-shadow: 0 4px 14px rgba(0,102,204,0.24);
  }

  .btn-create:active { transform: translateY(0) scale(0.97); }
  .btn-create svg { width: 15px; height: 15px; }

  /* ── Project Grid ── */
  .project-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  /* ── Card ── */
  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 0;
    border: 1px solid #eae8e4;
    border-radius: 10px;
    background: #ffffff;
    cursor: pointer;
    padding: 16px;
    box-shadow: 0 1px 3px rgba(120,100,70,0.04), 0 4px 12px rgba(120,100,70,0.03);
    animation: card-in 0.32s cubic-bezier(0.16,1,0.3,1) both;
    transition:
      transform 0.24s cubic-bezier(0.16,1,0.3,1),
      box-shadow 0.24s cubic-bezier(0.16,1,0.3,1),
      border-color 0.24s;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 10px rgba(120,100,70,0.06), 0 12px 28px rgba(120,100,70,0.06);
    border-color: #ddd9d2;
  }

  .card:active { transform: translateY(-1px) scale(0.995); }

  .card:nth-child(1) { animation-delay: 0ms; }
  .card:nth-child(2) { animation-delay: 50ms; }
  .card:nth-child(3) { animation-delay: 100ms; }
  .card:nth-child(4) { animation-delay: 150ms; }
  .card:nth-child(5) { animation-delay: 200ms; }

  .card-main {
    display: flex;
    align-items: flex-start;
    gap: 14px;
  }

  /* Cover */
  .card-cover {
    width: 68px;
    height: 96px;
    border-radius: 8px;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow:
      0 2px 4px rgba(80,60,30,0.08),
      0 6px 14px rgba(80,60,30,0.1);
    transition: transform 0.32s cubic-bezier(0.16,1,0.3,1);
  }

  .card:hover .card-cover { transform: scale(1.04) rotate(-1deg); }

  .card-cover-img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }

  .card-cover--empty {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #f7f5f2;
    border: 1.5px dashed #ddd9d2;
    box-shadow: none;
  }

  .card-cover--empty span {
    color: #a1a1aa;
    font-size: 11px;
    font-weight: 600;
  }

  /* Info */
  .card-info {
    min-width: 0;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .card-title {
    font-size: 16.5px;
    font-weight: 680;
    letter-spacing: -0.015em;
    line-height: 1.35;
    color: #18181b;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    transition: color 0.2s;
  }

  .card:hover .card-title { color: #0066cc; }

  .card-tags {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2.5px 9px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 680;
    letter-spacing: 0.01em;
    background: #f3f1ed;
    color: #78716c;
  }

  .card-meta {
    margin-top: 8px;
    color: #a1a1aa;
    font-size: 12.5px;
    line-height: 1.5;
  }

  /* Footer */
  .card-footer {
    display: flex;
    align-items: center;
    gap: 5px;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid #f3f1ed;
    color: #a1a1aa;
    font-size: 12px;
    font-weight: 520;
    font-variant-numeric: tabular-nums;
  }

  .card-footer svg { width: 13px; height: 13px; opacity: 0.65; }

  /* More button */
  .card-more {
    position: absolute;
    top: 12px;
    right: 12px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border: 1px solid #eae8e4;
    border-radius: 8px;
    background: rgba(255,255,255,0.92);
    color: #a1a1aa;
    cursor: pointer;
    opacity: 0;
    transform: translateY(-2px);
    transition: opacity 0.2s, transform 0.2s cubic-bezier(0.16,1,0.3,1), background 0.15s, color 0.15s;
  }

  .card:hover .card-more { opacity: 1; transform: translateY(0); }
  .card-more:hover { background: #fff; color: #52525b; border-color: #ddd9d2; }
  .card-more svg { width: 16px; height: 16px; }

  /* ── Animation ── */
  @keyframes card-in {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .shell { padding: 28px 16px 32px; }

    .hero {
      flex-direction: column;
      align-items: stretch;
      gap: 16px;
    }

    .hero-actions {
      width: 100%;
      justify-content: flex-start;
    }

    .btn-create { flex: 1; justify-content: center; }

    .project-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 420px) {
    .hero-actions {
      flex-wrap: wrap;
    }

    .tool-group { order: 1; }
    .icon-btn { order: 0; }
    .btn-create { order: 2; width: 100%; }
  }
</style>
</head>
<body>

<div class="variant-label">A: 暖白淡雅</div>

<div class="shell">

  <!-- ── Hero ── -->
  <header class="hero">
    <div class="hero-copy">

      <p>选择一个项目继续写作，或开始新的创作。</p>

    <div class="hero-actions">

      <button class="icon-btn" title="检查更新">

      <div class="tool-group">

        </button>
        <button class="tool-btn" title="Skills">

        </button>

        <button class="tool-btn" title="设置">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>

      <!-- 新建作品 -->
      <button class="btn-create">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建作品
      </button>
    </div>
  </header>

  <!-- ── Project Grid ── -->
  <section class="project-grid">

    <!-- Card 1 -->
    <article class="card">
      <div class="card-main">
        <div class="card-cover">
          <div class="card-cover-img" style="background: linear-gradient(145deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%);"></div>
        </div>
        <div class="card-info">
          <div class="card-title">霓虹下的老鼠</div>
          <div class="card-tags">
            <span class="tag">赛博朋克</span>
            <span class="tag">长篇</span>
          </div>

        </div>
      </div>
      <div class="card-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
        12.8万字
      </div>
      <button class="card-more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </article>

    <!-- Card 2 -->
    <article class="card">
      <div class="card-main">
        <div class="card-cover">
          <div class="card-cover-img" style="background: linear-gradient(135deg, #4a6741 0%, #7a956e 50%, #b5c4a8 100%);"></div>
        </div>
        <div class="card-info">
          <div class="card-title">山海纪年</div>
          <div class="card-tags">
            <span class="tag">东方玄幻</span>
            <span class="tag">长篇</span>
          </div>
          <div class="card-meta">最近编辑：昨天</div>
        </div>
      </div>
      <div class="card-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
        6.4万字
      </div>
      <button class="card-more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </article>

    <!-- Card 3: no cover -->
    <article class="card">
      <div class="card-main">
        <div class="card-cover card-cover--empty">
          <span>暂无封面</span>
        </div>
        <div class="card-info">
          <div class="card-title">深蓝航线</div>
          <div class="card-tags">
            <span class="tag">科幻</span>
            <span class="tag">中篇</span>
          </div>
          <div class="card-meta">最近编辑：3天前</div>
        </div>
      </div>
      <div class="card-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
        2.1万字
      </div>
      <button class="card-more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      </button>
    </article>

    <!-- Card 4 -->
    <article class="card">
      <div class="card-main">
        <div class="card-cover">
          <div class="card-cover-img" style="background: linear-gradient(135deg, #c2956b 0%, #e0b68a 50%, #f5d6b0 100%);"></div>
        </div>
        <div class="card-info">
          <div class="card-title">折骨刀</div>
          <div class="card-tags">
            <span class="tag">武侠</span>
            <span class="tag">短篇</span>
          </div>
          <div class="card-meta">最近编辑：上周</div>
        </div>
      </div>
      <div class="card-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
        0.8万字
      </div>
      <button class="card-more">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>

    <!-- Card 5: no cover -->
    <article class="card">
      <div class="card-main">
        <div class="card-cover card-cover--empty">
          <span>暂无封面</span>
        </div>
        <div class="card-info">
          <div class="card-title">寂静岭以北</div>
          <div class="card-tags">
            <span class="tag">悬疑</span>
            <span class="tag">长篇</span>
          </div>
          <div class="card-meta">最近编辑：5天前</div>
        </div>
      </div>
      <div class="card-footer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
        3.2万字

</body>
